server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost http://localhost:80 http://localhost:5000; img-src 'self' data: blob: http://localhost http://localhost:80 http://localhost:5000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_disable "MSIE [1-6]\.";

    # Health check endpoint
    location /health {
        access_log off;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost http://localhost:80 http://localhost:5000; img-src 'self' data: blob: http://localhost http://localhost:80 http://localhost:5000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Static assets with cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost http://localhost:80 http://localhost:5000; img-src 'self' data: blob: http://localhost http://localhost:80 http://localhost:5000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy (optional - uncomment if you want to proxy API calls)
    # This allows you to avoid CORS issues by proxying through Nginx
    # location /api {
    #     proxy_pass http://flask_backend:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Auth endpoints proxy (optional - uncomment if needed)
    # location /auth {
    #     proxy_pass http://flask_backend:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # SPA routing - serve index.html for all routes
    # This is critical for React Router to work properly
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost http://localhost:80 http://localhost:5000; img-src 'self' data: blob: http://localhost http://localhost:80 http://localhost:5000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        
        # No cache for index.html to ensure users get latest version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost http://localhost:80 http://localhost:5000; img-src 'self' data: blob: http://localhost http://localhost:80 http://localhost:5000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    }
}
